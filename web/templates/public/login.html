{% extends "base.html" %}
{% block title %}Вход — Coaching Operators{% endblock %}
{% block content %}
<section class="login-section">
    <div class="login-card">
        <h1>🔐 Вход в систему</h1>
        <p>Войдите через Telegram, чтобы получить доступ к админ-панели</p>

        <script async src="https://telegram.org/js/telegram-widget.js?22"
                data-telegram-login="{{ bot_name }}"
                data-size="large"
                data-radius="10"
                data-request-access="write"
                data-auth-url="/auth/telegram">
        </script>

        <p class="login-hint">
            После входа вы будете перенаправлены в админ-панель
            (только для администраторов)
        </p>
    </div>
</section>
{% endblock %}
